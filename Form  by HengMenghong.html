    </div>
    <br>
    <div>
        <label for="">Department</label>

        <input type="checkbox"> Civil

        <label for="">City :</label>

    </div>
    <br>
    <div>
        <label for="">Address</label>
        <input type="text" big placeholder="">
    </div>
    <br>
    <input type="submit" value="Register">
